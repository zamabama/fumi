name = "fumi"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# Set your account ID here (or use CLOUDFLARE_ACCOUNT_ID env var)
# account_id = "your-account-id"

# KV namespace binding — create with: npx wrangler kv namespace create MESSAGES
[[kv_namespaces]]
binding = "MESSAGES"
id = "your-kv-namespace-id"
